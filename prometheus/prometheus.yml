global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'fastapi'
    static_configs:
      - targets: ['app:8000']
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']  

rule_files:
  - "alerts.yml"