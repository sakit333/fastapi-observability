<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Observability</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Welcome to FastAPI Observability</h1>
        <p>Click the buttons below to test different endpoints:</p>
        <div class="buttons">
            <button onclick="callEndpoint('/demo/info')">Demo Info</button>
            <button onclick="callEndpoint('/demo/error')">Demo Error</button>
            <button onclick="callEndpoint('/demo/work')">Demo Work</button>
            <button onclick="callEndpoint('/test-trace')">Test Trace</button>
            <a href="/metrics" target="_blank"><button>Metrics</button></a>
            <a href="/signup"><button>Sign Up</button></a>
            <a href="/login"><button>Login</button></a>
        </div>
        <div id="response"></div>
    </div>
    <script src="/static/js/script.js"></script>
</body>
</html>
