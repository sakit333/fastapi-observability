server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: fastapi

    static_configs:
      - targets:
          - localhost   # required dummy value
        labels:
          job: fastapi
          service: fastapi-observability
          env: docker
          __path__: /var/logs/*.log   # ✅ matches docker-compose

    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            trace_id: trace_id
            span_id: span_id
            request_id: request_id
            path: path
            status_code: status_code

      - labels:
          level:
          status_code:
          path: